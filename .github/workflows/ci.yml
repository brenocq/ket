name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: 🐧 Linux
          - os: macos-latest
            name: 🍎 macOS
          - os: windows-latest
            name: 🪟 Windows
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DKET_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  python-tests:
    name: ${{ matrix.name }} · Python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: 🐧 Linux
          - os: macos-latest
            name: 🍎 macOS
          - os: windows-latest
            name: 🪟 Windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (builds the bindings from source)
        run: pip install ".[test]"

      - name: Test
        run: pytest
