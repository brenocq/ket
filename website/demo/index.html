<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ket — debugger</title>
    <meta name="description" content="The ket quantum circuit debugger, running in your browser via WebAssembly." />
    <link rel="icon" href="../assets/icon.png" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      .demo-top {
        display: flex;
        align-items: center;
        gap: 14px;
        height: 48px;
        padding: 0 18px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      .demo-top .brand {
        font-size: 17px;
      }
      .demo-top .sep {
        color: var(--faint);
      }
      .demo-top .crumb {
        color: var(--muted);
        font-size: 14px;
      }
      .demo-top .right {
        margin-left: auto;
        display: flex;
        gap: 18px;
        align-items: center;
      }
      .demo-top a.lnk {
        color: var(--muted);
        font-size: 14px;
        font-weight: 500;
        transition: color 0.15s;
      }
      .demo-top a.lnk:hover {
        color: var(--text);
      }
      .stage {
        height: calc(100% - 48px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        box-sizing: border-box;
      }
      .frame {
        aspect-ratio: 1280 / 720;
        width: 1280px;
        max-width: 100%;
        max-height: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 30px 90px -40px rgba(0, 0, 0, 0.9);
        background: #0a0a0a;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        outline: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--bg);
        transition: opacity 0.5s ease;
        z-index: 10;
      }
      .spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid var(--surface-2);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #status {
        color: var(--muted);
        font-size: 14px;
        margin: 0;
      }
      .hint {
        position: fixed;
        bottom: 14px;
        left: 0;
        right: 0;
        text-align: center;
        color: var(--faint);
        font-size: 12.5px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header class="demo-top">
      <a class="brand" href="../">
        <img src="../assets/logo.svg" alt="" style="height: 24px" />
        ket
      </a>
      <span class="sep">/</span>
      <span class="crumb">debugger</span>
      <div class="right">
        <a class="lnk" href="https://github.com/brenocq/ket">GitHub</a>
        <a class="lnk" href="../">← Back</a>
      </div>
    </header>

    <main class="stage">
      <div class="frame">
        <canvas id="canvas" width="1280" height="720" tabindex="0"
          oncontextmenu="event.preventDefault()"></canvas>
      </div>
    </main>

    <div class="hint">Use the File and Examples menus to load circuits · step with the transport controls</div>

    <div id="loading">
      <div class="spinner"></div>
      <p id="status">Loading the debugger…</p>
    </div>

    <script>
      var statusEl = document.getElementById("status");
      var loadingEl = document.getElementById("loading");
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (t) { console.log(t); },
        printErr: function (t) { console.warn(t); },
        setStatus: function (t) { if (statusEl && t) statusEl.textContent = t; },
        onRuntimeInitialized: function () {
          // Let the first frames render, then fade the loader out.
          setTimeout(function () {
            loadingEl.style.opacity = "0";
            setTimeout(function () { loadingEl.style.display = "none"; }, 500);
          }, 700);
        },
      };
    </script>
    <script src="ket-gui.js"></script>
  </body>
</html>
