<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" fill="none" role="img" aria-label="ket">
  <g stroke="#fbbf24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- ears (two kets) -->
    <g transform="translate(118,82) rotate(-116) scale(0.7)">
      <line vector-effect="non-scaling-stroke" x1="-26" y1="-52" x2="-26" y2="52"/>
      <polyline vector-effect="non-scaling-stroke" points="6,-52 44,0 6,52"/>
    </g>
    <g transform="translate(242,82) scale(-1,1) rotate(-116) scale(0.7)">
      <line vector-effect="non-scaling-stroke" x1="-26" y1="-52" x2="-26" y2="52"/>
      <polyline vector-effect="non-scaling-stroke" points="6,-52 44,0 6,52"/>
    </g>
    <!-- nose (one ket) -->
    <g transform="translate(180,184) rotate(90) scale(0.45)">
      <line vector-effect="non-scaling-stroke" x1="-26" y1="-52" x2="-26" y2="52"/>
      <polyline vector-effect="non-scaling-stroke" points="6,-52 44,0 6,52"/>
    </g>
    <!-- whiskers -->
    <line vector-effect="non-scaling-stroke" x1="132" y1="174" x2="66" y2="160"/>
    <line vector-effect="non-scaling-stroke" x1="228" y1="174" x2="294" y2="160"/>
    <line vector-effect="non-scaling-stroke" x1="132" y1="188" x2="66" y2="190"/>
    <line vector-effect="non-scaling-stroke" x1="228" y1="188" x2="294" y2="190"/>
    <line vector-effect="non-scaling-stroke" x1="132" y1="202" x2="66" y2="220"/>
    <line vector-effect="non-scaling-stroke" x1="228" y1="202" x2="294" y2="220"/>
  </g>
  <!-- eyes -->
  <g fill="#fbbf24">
    <circle cx="140" cy="132" r="14"/>
    <circle cx="220" cy="132" r="14"/>
  </g>
</svg>
